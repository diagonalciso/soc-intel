services:

  # ── API Backend ──────────────────────────────────────────────
  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks: [clawint]

  # ── Worker (connector + enrichment processor) ────────────────
  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: python -m app.workers.main
    depends_on:
      - api
    volumes:
      - ./backend:/app
    networks: [clawint]

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    networks: [clawint]

  # ── OpenSearch ───────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [clawint]

  # ── OpenSearch Dashboards (optional) ────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.12.0
    restart: unless-stopped
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks: [clawint]

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clawint}
      POSTGRES_USER: ${POSTGRES_USER:-clawint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clawint}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clawint}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [clawint]

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-clawint}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-clawint}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [clawint]

  # ── RabbitMQ ─────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-clawint}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-clawint}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [clawint]

  # ── MinIO ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clawint}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clawint123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [clawint]

  # ── Tor Proxy (dark web connectors) ─────────────────────────
  tor:
    image: dperson/torproxy:latest
    restart: unless-stopped
    ports:
      - "9050:9050"
      - "8118:8118"
    networks: [clawint]

volumes:
  opensearch_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  clawint:
    driver: bridge
